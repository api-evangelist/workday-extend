specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Extend
providerId: workday-extend
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Low-Code
  - Custom Applications
  - Rate Limiting
description: Workday Extend apps run inside the customer's Workday tenant and inherit tenant-level API throughput and integration concurrency limits. Workday does not publish numeric Extend rate limits on its public marketing site; specifics live in Workday Community / Customer Center documentation behind authentication.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No publicly documented per-second or per-minute limits exist for Extend apps; scaffold tier numbers have been removed.
responseCodes: {}
limits:
  - name: Tenant-Inherited Throughput
    scope: tenant
    metric: varies
    limit: governed by the parent Workday tenant; not publicly documented
    notes: Extend apps consume the same Workday API capacity envelope as native integrations; per-tenant transactional and concurrency limits apply.
policies:
  - name: Tenant Inheritance
    description: Extend apps share the underlying Workday tenant's API quotas; throttling, retries, and integration backoff follow the tenant's policies rather than a separate Extend rate-limit surface.
  - name: Customer Center Documentation
    description: Operational specifics for Extend throughput, app concurrency, and event handling are published to authenticated Workday customers and partners in Workday Community.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
