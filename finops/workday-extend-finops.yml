description: FOCUS-aligned FinOps stub for Workday Extend. Extend is sold as an add-on platform entitlement to existing Workday tenants; there is no public per-app-call price and no public usage API, so meters describe contractual entitlement rather than runtime telemetry.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public pricing or usage API exists. Scaffold api_request and compute meters have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Low-Code Platform
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Extend
  ServiceCategory: Low-Code Platform
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: extend_entitlement
    description: Annual Workday Extend platform entitlement attached to the parent Workday tenant subscription.
    unit: month
    aggregation: max
    dimensions:
      - tenant
  - name: extend_apps_in_use
    description: Count of Extend apps deployed against the tenant; tracked by Workday for entitlement governance rather than per-app billing.
    unit: app
    aggregation: max
    dimensions:
      - tenant
      - app
principles:
  - name: Visibility
    description: Track Extend value by maintaining an inventory of deployed Extend apps and their owners; raw API call telemetry is not exposed externally, so cost-justification relies on app-level adoption metrics.
  - name: Allocation
    description: Allocate the Extend entitlement back to the product or business unit that requested each app; charge incremental development effort to the sponsoring team.
  - name: Optimization
    description: Retire unused Extend apps before renewal, consolidate overlapping ones, and prefer configuring native Workday capability before building custom Extend apps to avoid duplicative platform spend.
  - name: Accountability
    description: A platform owner inside the Workday Center of Excellence should approve new Extend app builds, review utilization quarterly, and consolidate the Extend SKU into the broader Workday renewal conversation.
maintainers:
