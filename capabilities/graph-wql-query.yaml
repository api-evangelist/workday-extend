naftiko: 1.0.0-alpha2
info:
  label: Workday Extend Workday Graph API — WQL Query
  description: 'Workday Extend Workday Graph API — WQL Query. 1 operations. Lead operation: Workday Extend Execute a WQL query.
    Self-contained Naftiko capability covering one Workday Extend business surface.'
  tags:
  - Workday Extend
  - WQL Query
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_EXTEND_API_KEY: WORKDAY_EXTEND_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-wql-query
    baseUri: https://{baseUrl}/api/graphql/v1/{tenant}
    description: Workday Extend Workday Graph API — WQL Query business capability. Self-contained, no shared references.
    resources:
    - name: wql
      path: /wql
      operations:
      - name: executewqlquery
        method: POST
        description: Workday Extend Execute a WQL query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_EXTEND_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-wql-query-rest
    port: 8080
    description: REST adapter for Workday Extend Workday Graph API — WQL Query. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wql
      name: wql
      description: REST surface for wql.
      operations:
      - method: POST
        name: executewqlquery
        description: Workday Extend Execute a WQL query
        call: graph-wql-query.executewqlquery
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-wql-query-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Extend Workday Graph API — WQL Query. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: workday-extend-execute-wql-query
      description: Workday Extend Execute a WQL query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: graph-wql-query.executewqlquery
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
