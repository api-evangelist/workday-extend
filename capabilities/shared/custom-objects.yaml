naftiko: "1.0.0-alpha1"

info:
  label: "Workday Custom Objects API"
  description: "APIs for defining and managing custom objects that extend Workday's data model."
  tags:
    - Workday
    - Extend
    - Custom Objects
    - Data Model
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_EXTEND_ACCESS_TOKEN: WORKDAY_EXTEND_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: custom-objects
      baseUri: https://api.workday.com/api/customObjects/v1/{tenant}
      description: "Custom object definition and instance management"
      authentication:
        type: bearer
        token: "{{WORKDAY_EXTEND_ACCESS_TOKEN}}"
      resources:
        - name: custom-object-definitions
          path: /customObjectDefinitions
          description: "Custom object type definitions"
          operations:
            - name: list-custom-object-definitions
              method: GET
              description: "List custom object definitions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-custom-object-definition
              method: POST
              description: "Create a custom object definition"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
        - name: custom-object-worker-data
          path: /workers/{workerId}/customObjects/{objectType}
          description: "Custom object data attached to workers"
          operations:
            - name: get-worker-custom-object-data
              method: GET
              description: "Retrieve custom object data for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "The worker identifier"
                - name: objectType
                  in: path
                  type: string
                  required: true
                  description: "The custom object type name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upsert-worker-custom-object-data
              method: PUT
              description: "Create or update custom object data for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "The worker identifier"
                - name: objectType
                  in: path
                  type: string
                  required: true
                  description: "The custom object type name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data: "{{tools.data}}"

  exposes:
    - type: rest
      port: 8102
      namespace: custom-objects-rest-api
      resources:
        - path: /v1/custom-object-definitions
          name: custom-object-definitions
          description: "Custom object type management"
          operations:
            - method: GET
              name: list-custom-object-definitions
              description: "List custom object definitions"
              call: "custom-objects.list-custom-object-definitions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: custom-objects-mcp
      transport: http
      tools:
        - name: list-custom-object-definitions
          description: "List all custom object type definitions in the tenant"
          hints:
            readOnly: true
            openWorld: true
          call: "custom-objects.list-custom-object-definitions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-custom-object-data
          description: "Retrieve custom object data attached to a specific worker"
          hints:
            readOnly: true
            openWorld: true
          call: "custom-objects.get-worker-custom-object-data"
          with:
            workerId: "tools.workerId"
            objectType: "tools.objectType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upsert-worker-custom-object-data
          description: "Create or update custom object data for a worker"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "custom-objects.upsert-worker-custom-object-data"
          with:
            workerId: "tools.workerId"
            objectType: "tools.objectType"
          outputParameters:
            - type: object
              mapping: "$."
