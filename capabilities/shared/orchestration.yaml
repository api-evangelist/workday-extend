naftiko: "1.0.0-alpha1"

info:
  label: "Workday Orchestration API"
  description: "APIs for creating and managing orchestrations that automate business processes and integrate with external systems."
  tags:
    - Workday
    - Extend
    - Orchestration
    - Automation
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_EXTEND_ACCESS_TOKEN: WORKDAY_EXTEND_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: orchestration
      baseUri: https://api.workday.com/api/orchestrate/v1/{tenant}
      description: "Workday orchestration management and execution API"
      authentication:
        type: bearer
        token: "{{WORKDAY_EXTEND_ACCESS_TOKEN}}"
      resources:
        - name: orchestrations
          path: /orchestrations
          description: "Orchestration definition management"
          operations:
            - name: list-orchestrations
              method: GET
              description: "List orchestrations"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Results offset for pagination"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search term"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-orchestration
              method: POST
              description: "Create an orchestration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
        - name: orchestration-executions
          path: /orchestrations/{orchestrationId}/executions
          description: "Orchestration execution management"
          operations:
            - name: list-executions
              method: GET
              description: "List orchestration executions"
              inputParameters:
                - name: orchestrationId
                  in: path
                  type: string
                  required: true
                  description: "The orchestration identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: launch-execution
              method: POST
              description: "Launch an orchestration execution"
              inputParameters:
                - name: orchestrationId
                  in: path
                  type: string
                  required: true
                  description: "The orchestration identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputData: "{{tools.inputData}}"
        - name: orchestration-triggers
          path: /orchestrations/{orchestrationId}/triggers
          description: "Orchestration trigger configuration"
          operations:
            - name: list-triggers
              method: GET
              description: "List orchestration triggers"
              inputParameters:
                - name: orchestrationId
                  in: path
                  type: string
                  required: true
                  description: "The orchestration identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-trigger
              method: POST
              description: "Create an orchestration trigger"
              inputParameters:
                - name: orchestrationId
                  in: path
                  type: string
                  required: true
                  description: "The orchestration identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  triggerType: "{{tools.triggerType}}"
                  configuration: "{{tools.configuration}}"

  exposes:
    - type: rest
      port: 8101
      namespace: orchestration-rest-api
      resources:
        - path: /v1/orchestrations
          name: orchestrations
          description: "Orchestration management"
          operations:
            - method: GET
              name: list-orchestrations
              description: "List orchestrations"
              call: "orchestration.list-orchestrations"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: orchestration-mcp
      transport: http
      tools:
        - name: list-orchestrations
          description: "List all orchestration definitions in the tenant"
          hints:
            readOnly: true
            openWorld: true
          call: "orchestration.list-orchestrations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: launch-execution
          description: "Launch an orchestration execution with input data"
          hints:
            readOnly: false
            destructive: false
          call: "orchestration.launch-execution"
          with:
            orchestrationId: "tools.orchestrationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-executions
          description: "List executions for an orchestration"
          hints:
            readOnly: true
            openWorld: true
          call: "orchestration.list-executions"
          with:
            orchestrationId: "tools.orchestrationId"
          outputParameters:
            - type: object
              mapping: "$."
