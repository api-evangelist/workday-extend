naftiko: "1.0.0-alpha1"

info:
  label: "Workday Extend REST API"
  description: "RESTful APIs for building and managing Workday Extend applications, including app registration, deployment, configuration, and lifecycle management."
  tags:
    - Workday
    - Extend
    - Custom Applications
    - Platform
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_EXTEND_ACCESS_TOKEN: WORKDAY_EXTEND_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: extend
      baseUri: https://api.workday.com/api/extend/v1/{tenant}
      description: "Workday Extend application management API"
      authentication:
        type: bearer
        token: "{{WORKDAY_EXTEND_ACCESS_TOKEN}}"
      resources:
        - name: apps
          path: /apps
          description: "Extend application registration and management"
          operations:
            - name: list-apps
              method: GET
              description: "List Extend applications"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to skip for pagination"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search term to filter results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-app
              method: POST
              description: "Register a new Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  category: "{{tools.category}}"
        - name: apps-by-id
          path: /apps/{appId}
          description: "Manage a specific Extend application"
          operations:
            - name: get-app
              method: GET
              description: "Retrieve an Extend application"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-app
              method: PATCH
              description: "Update an Extend application"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: delete-app
              method: DELETE
              description: "Delete an Extend application"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: app-versions
          path: /apps/{appId}/versions
          description: "Manage application versions"
          operations:
            - name: list-app-versions
              method: GET
              description: "List application versions"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-app-version
              method: POST
              description: "Create a new application version"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  versionNumber: "{{tools.versionNumber}}"
                  changelog: "{{tools.changelog}}"
        - name: app-deployments
          path: /apps/{appId}/deployments
          description: "Manage application deployments"
          operations:
            - name: list-app-deployments
              method: GET
              description: "List application deployments"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deploy-app
              method: POST
              description: "Deploy an Extend application"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  versionId: "{{tools.versionId}}"
                  environment: "{{tools.environment}}"
        - name: app-configurations
          path: /apps/{appId}/configurations
          description: "Manage application configuration settings"
          operations:
            - name: list-app-configurations
              method: GET
              description: "List application configurations"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-app-configurations
              method: PUT
              description: "Update application configurations"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the Extend application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  configurations: "{{tools.configurations}}"

  exposes:
    - type: rest
      port: 8100
      namespace: extend-rest-api
      resources:
        - path: /v1/apps
          name: apps
          description: "Extend application management"
          operations:
            - method: GET
              name: list-apps
              description: "List Extend applications"
              call: "extend.list-apps"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-app
              description: "Register a new Extend application"
              call: "extend.create-app"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/apps/{appId}
          name: app-by-id
          description: "Specific application management"
          operations:
            - method: GET
              name: get-app
              description: "Retrieve an Extend application"
              call: "extend.get-app"
              with:
                appId: "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: extend-mcp
      transport: http
      tools:
        - name: list-apps
          description: "List all Extend applications registered in the tenant"
          hints:
            readOnly: true
            openWorld: true
          call: "extend.list-apps"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-app
          description: "Register a new Extend application"
          hints:
            readOnly: false
            destructive: false
          call: "extend.create-app"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-app
          description: "Retrieve details of a specific Extend application"
          hints:
            readOnly: true
            openWorld: true
          call: "extend.get-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deploy-app
          description: "Deploy an Extend application version to an environment"
          hints:
            readOnly: false
            destructive: false
          call: "extend.deploy-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
