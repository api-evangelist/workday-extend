description: Workday Extend is a low-code platform sold as an add-on to existing Workday HCM / Financial Management subscriptions. Workday does not publish Extend pricing on workday.com; access is sold to existing Workday customers under the master subscription via Workday sales.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: Extend is only available to existing Workday tenants, and there is no public price list or per-app-call rate. Scaffold Free / Pro / Enterprise tiers have been removed.
plans:
  - id: workday-extend-contact-sales
    name: Contact Sales
    type: enterprise
    description: Workday Extend is licensed as an add-on to a customer's Workday tenant subscription. Pricing covers the platform entitlement and is quoted alongside the underlying Workday HCM or Financial Management contract.
    entries:
      - label: Extend Add-On Subscription
        name: extend_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Workday Extend Platform
      - name: App Builder
      - name: Workday API Access from Custom Apps
      - name: Bundled with Workday Tenant
